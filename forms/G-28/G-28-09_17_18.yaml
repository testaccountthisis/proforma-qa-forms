# ==========================================================
#  USCIS Form G-28 — portable config (edition 09/17/18)
#
#  Edit and re-import to update this form's logic everywhere it is used.
#  Lines starting with # are COMMENTS and are ignored on import.
#
#  Fields are anchored by their PDF widget name (raw_name), so this file
#  maps onto any copy of the same official PDF edition.
#
#  Operators: is checked / is not checked · equals / is not · contains
#    · greater than / less than / at least / at most · is empty /
#    is not empty · on / before / after / on or before / on or after
# ==========================================================

form:
  form_number: G-28
  edition_date: 09/17/18

# ──────  SECTIONS  ──────
#   Verbatim section/subsection headers in PDF order; list_type flags repeating lists.
sections:
- name: Part 1. Information About Attorney or Accredited Representative
  order: 0
  list_type: not_list
- name: Part 2. Eligibility Information for Attorney or Accredited Representative
  order: 1
  list_type: not_list
- name: Part 3. Notice of Appearance as Attorney or Accredited Representative
  order: 2
  list_type: not_list
- name: Part 4. Client's Consent to Representation and Signature
  order: 3
  list_type: not_list
- name: Part 5. Signature of Attorney or Accredited Representative
  order: 4
  list_type: not_list
- name: Part 6. Additional Information
  order: 5
  list_type: not_list

# ──────  BOOKMARKS  ──────
#   Saved Part highlight regions (normalized [x,y,w,h]); clicking the bookmark flashes this box on the PDF.
bookmarks:
- label: Address of Attor
  page: 2
  rect:
  - 0.49693627450980393
  - 0.22537878787878787
  - 0.45588235294117646
  - 0.3371212121212121

# ──────  RULES  ──────
#   Copy=reuse · Same person=identity · Reminder=requirement · Conflict=exclusion · Documents=evidence
rules:
# Conflict: when "Daytime Telephone Number" is not empty, "Fax Number" is empty
- type: exclusion
  when:
    all_of:
    - Line4_DaytimeTelephoneNumber[0]: is not empty
  require:
    all_of:
    - Pt1ItemNumber7_FaxNumber[0]: is empty
# Reuse: "Mobile Telephone Number (if any)" is filled from "Daytime Telephone Number"
- type: copy
  copy:
    to: Line6_EMail[0]
    from: Line4_DaytimeTelephoneNumber[0]

